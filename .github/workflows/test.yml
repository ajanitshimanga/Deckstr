name: Test

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  go:
    name: Go (build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod verify

      # The root `main` package uses //go:embed all:frontend/dist, which is
      # gitignored and only produced by a frontend build. Our test packages
      # (internal/..., test/...) don't depend on it, so build & test those
      # explicitly rather than running go-wide commands that pull in main.
      - name: Build (non-main packages)
        run: go build ./internal/... ./test/...

      - name: Test (with race detector + coverage)
        env:
          CGO_ENABLED: '1'
        run: go test -race -coverprofile=coverage.out ./internal/... ./test/...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 14

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      # Wails generates the TypeScript bindings under frontend/wailsjs/ that
      # the React code imports. These are gitignored, so we must regenerate
      # them before the TS build can succeed.
      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      # `wails generate module` compiles the root package, which has
      # //go:embed all:frontend/dist. Create a placeholder so the embed
      # pattern resolves; the real dist is built below.
      - name: Stub frontend/dist for embed
        run: mkdir -p frontend/dist && touch frontend/dist/.gitkeep

      - name: Generate Wails bindings
        run: wails generate module

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Test frontend
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build
