name: Test

on:
  pull_request:
    branches: [master, main]
  push:
    branches: [master, main]

jobs:
  go:
    name: Go (build + test)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Test (with race detector + coverage)
        env:
          CGO_ENABLED: '1'
        run: go test -race -coverprofile=coverage.out ./...

      - name: Show coverage summary
        run: go tool cover -func=coverage.out | tail -20

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage.out
          retention-days: 14

  frontend:
    name: Frontend (build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
