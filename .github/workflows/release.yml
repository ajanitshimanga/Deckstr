name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Build application
        run: wails build -ldflags "-X 'OpenSmurfManager/internal/updater.Version=${{ steps.version.outputs.VERSION }}' -X 'OpenSmurfManager/internal/updater.GitHubOwner=${{ github.repository_owner }}' -X 'OpenSmurfManager/internal/updater.GitHubRepo=${{ github.event.repository.name }}' -X 'OpenSmurfManager/internal/telemetry.posthogAPIKey=${{ secrets.POSTHOG_API_KEY }}'"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Update installer version
        shell: pwsh
        run: |
          $content = Get-Content installer/setup.iss -Raw
          $content = $content -replace '#define MyAppVersion "1.0.0"', '#define MyAppVersion "${{ steps.version.outputs.VERSION }}"'
          $content = $content -replace 'OutputBaseFilename=Deckstr-Setup-1.0.0', 'OutputBaseFilename=Deckstr-Setup-${{ steps.version.outputs.VERSION }}'
          Set-Content installer/setup.iss $content

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\setup.iss

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Deckstr-Windows
          path: build/installer/*.exe

  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      # The root `main` package needs frontend/dist (gitignored, built by
      # Wails) to compile. Test packages live under internal/ and test/.
      - name: Run tests
        run: go test ./internal/... ./test/... -v

  release:
    needs: [build-windows, test]
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          name: Deckstr v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
