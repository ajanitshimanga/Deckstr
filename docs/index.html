<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deckstr — your game accounts in one encrypted vault</title>
  <meta name="description" content="Deckstr is an encrypted deck for your gaming accounts — every login stored locally on your machine. Beta ranked sync for League, Valorant, and TFT." />

  <meta property="og:title" content="Deckstr" />
  <meta property="og:description" content="All your game accounts. One encrypted deck." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://ajanitshimanga.github.io/Deckstr/" />
  <meta property="og:image" content="https://ajanitshimanga.github.io/Deckstr/screenshots/dashboard.png" />

  <link rel="icon" type="image/svg+xml" href="logo.svg" />
  <link rel="stylesheet" href="style.css?v=1.4.3" />
</head>
<body>
  <img
    class="backdrop"
    src="screenshots/dashboard.png"
    alt=""
    aria-hidden="true"
    loading="lazy"
    style="position:fixed;top:50%;left:4vw;transform:translateY(-50%);max-width:52vw;max-height:92vh;opacity:0.9;pointer-events:none;z-index:0"
  />

  <main>
    <img src="logo.svg" alt="Deckstr logo" class="logo" width="64" height="64" />

    <h1>
      All your game accounts.<br />
      One encrypted deck.
    </h1>
    <p class="kicker">A deck for your gaming accounts — stored encrypted on your machine.</p>

    <a id="download" class="cta" href="https://github.com/ajanitshimanga/Deckstr/releases/latest" rel="noopener">
      <span class="cta-icon" aria-hidden="true">↓</span>
      <span class="cta-label">
        <span class="cta-title">Download for Windows</span>
        <span class="cta-meta" id="download-meta">latest release</span>
      </span>
    </a>

    <p class="fineprint">Windows 10 or later · ~6&nbsp;MB · No account required</p>

    <p class="beta-note">
      Ranked sync for League, Valorant, and TFT — <span class="beta">beta</span>.
    </p>
  </main>

  <footer>
    <a href="https://github.com/ajanitshimanga/Deckstr">GitHub</a>
    <span aria-hidden="true">·</span>
    <a href="https://github.com/ajanitshimanga/Deckstr/blob/master/TELEMETRY.md">Telemetry</a>
    <span aria-hidden="true">·</span>
    <a href="https://github.com/ajanitshimanga/Deckstr/issues/new">Report an issue</a>
  </footer>

  <script src="script.js?v=1.4.3" defer></script>
</body>
</html>
