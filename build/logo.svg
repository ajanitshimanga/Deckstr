<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" rx="92" fill="#1a3a5c"/>

  <!-- Main D shape: vertical stem on the left, bowl curving to the right.
       Built as one filled path: outer silhouette + inner counter (cut via evenodd). -->
  <path fill="#3d9be9" fill-rule="evenodd" d="
    M110 58
    L210 58
    C278 58 328 110 328 200
    C328 290 278 342 210 342
    L110 342
    Z
    M156 104
    L156 296
    L210 296
    C252 296 282 258 282 200
    C282 142 252 104 210 104
    Z
  "/>

  <!-- Highlight / lighter overlay on the top-left curve of the D for depth -->
  <path fill="#6bbfff" opacity="0.5" d="
    M110 58
    L210 58
    C252 58 286 78 306 112
    C290 108 272 110 258 120
    C244 130 236 146 234 162
    L210 104
    L156 104
    L156 180
    C146 176 136 168 128 158
    C112 138 104 112 110 88
    Z
  "/>

  <!-- Flag / banner accent, repositioned onto the D's bowl curve -->
  <g transform="translate(215,210) rotate(-22)">
    <path fill="#f5c842" d="M-22,6 Q-18,18 0,20 Q18,18 22,6 Z"/>
    <rect fill="#d4a020" x="-10" y="-1" width="20" height="10" rx="2.5"/>
    <line stroke="#c87800" stroke-width="2" fill="none" x1="2" y1="-1" x2="2" y2="-34"/>
    <path fill="white" opacity="0.95" d="M3,-3 L3,-32 L20,-10 Z"/>
  </g>

  <!-- Decorative bubble/stitch marks around the D -->
  <path fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round" d="M118,238 Q126,232 134,238"/>
  <path fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round" d="M296,260 Q304,254 312,260"/>
  <path fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="2.5" stroke-linecap="round" d="M200,322 Q208,316 216,322"/>
</svg>
